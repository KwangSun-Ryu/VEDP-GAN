## Diffusion-only ablation baseline configuration
[runtime]
batch_size = 256
num_workers = 2
bin_threshold = 0.5
## Controls how the target distribution is matched when creating synthetic CSV files
## - "prior": generate according to the full original target distribution
## - "balanced": generate with equal class counts
## - independent from the training minibatch sampler
sampling_strategy = "balanced"

[evaluation]
## SciPy ks_2samp p-value calculation mode inside KSComplement
## - "asymp": avoids warnings from failed exact calculations
## - "auto"/"exact": SciPy default automatic/exact calculation
ks_complement_method = "asymp"

[train]
epochs = 8700
lr = 1e-3

## Checkpoint selection settings
[checkpoint_selection]
enable_best_on_test_selection = true
selection_save_every = 5
## - "stable_fidelity_score": `KSC_full`/`TVC_full` gate + weighted score + neighbor stable score
## - "best_auc_test": select the checkpoint with the highest AUC_test
## - "gated_best_auc_test": select the candidate with the highest AUC_test among checkpoints passing the `KSC_full`/`TVC_full` gate
checkpoint_selection_policy = "gated_best_auc_test"
checkpoint_selection_use_fidelity_gate = true
checkpoint_selection_ksc_gate_delta = 0.03
checkpoint_selection_tvc_gate_delta = 0.02
checkpoint_selection_auc_weight = 0.70
checkpoint_selection_ksc_weight = 0.15
checkpoint_selection_tvc_weight = 0.15
checkpoint_selection_use_stable_score = true
checkpoint_selection_current_weight = 0.50
checkpoint_selection_prev_weight = 0.25
checkpoint_selection_next_weight = 0.25

[latent]
latent_dim = 32
timesteps = 1000

[diffusion]
w_diff = 1.0

[loss]
w_rec = 1.5
w_kl = 0.005

[stabilization]
use_lr_scheduler = true
use_r1_penalty = true
r1_weight = 10.0
## Automatic quota sampler to reduce minority-class starvation in training minibatches
## natural keeps the existing shuffle, while auto_minority_quota enforces a minimum minority count per batch when conditions are met
batch_sampling_strategy = "auto_minority_quota"
minority_quota_trigger_ratio = 0.03
minority_quota_trigger_expected = 8.0
minority_quota_trigger_zero_prob = 0.02
minority_max_ratio = 0.05
use_generator_ema = true
use_mixed_precision = true
grad_clip_norm = 1.0
use_label_smoothing = true
label_smoothing = 0.05
use_wide_condition_embedding = true
use_bounded_head = true
use_continuous_clip = true
[model.encoder]
encoder_hidden_dim = 256
encoder_num_blocks = 3
use_residual_encoder = true

[model.decoder]
decoder_hidden_dim = 256
decoder_num_blocks = 3
decoder_shared_dim = 128
decoder_head_hidden_dim = 128
use_residual_decoder = true

[model.denoiser]
denoiser_hidden_dim = 128
denoiser_num_blocks = 2
